name: FoodMap
options:
  bundleIdPrefix: com.foodmap
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
  developmentLanguage: en
settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: complete
targets:
  FoodMap:
    type: application
    platform: iOS
    sources:
      - path: FoodMap
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.foodmap.app
        INFOPLIST_KEY_CFBundleDisplayName: FoodMap
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "FoodMap can read a photo of an expiry date so it can recognize the date for you."
        INFOPLIST_KEY_NSCameraUsageDescription: "FoodMap uses the camera to scan product barcodes and expiry dates."
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UIUserInterfaceStyle: Automatic
  FoodMapTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FoodMapTests
    dependencies:
      - target: FoodMap
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.foodmap.app.tests
schemes:
  FoodMap:
    build:
      targets:
        FoodMap: all
        FoodMapTests: [test]
    test:
      targets:
        - FoodMapTests
      gatherCoverageData: true
