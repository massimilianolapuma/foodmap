name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**", "chore/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  code-quality: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Lint, Build & Test
    runs-on: macos-26
    timeout-minutes: 45
    env:
      SCHEME: FoodMap
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd # v1.6.0
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Install tooling
        run: brew install xcodegen swiftlint swiftformat

      - name: Generate Xcode project
        run: xcodegen generate

      - name: SwiftFormat (lint)
        run: swiftformat --lint .

      - name: SwiftLint (strict)
        run: swiftlint --strict

      - name: Build & test (unit)
        run: |
          set -o pipefail
          DEVICE="iPhone 17"
          if ! xcrun simctl list devices available | grep -q "$DEVICE ("; then
            echo "iPhone 17 not available on this runner; selecting another iPhone simulator."
            DEVICE=$(xcrun simctl list devices available \
              | grep -oE 'iPhone [0-9][0-9A-Za-z ]*' | sed 's/ *$//' | head -1)
          fi
          echo "Using simulator: $DEVICE"
          rm -rf build/FoodMap.xcresult
          xcodebuild test \
            -scheme "$SCHEME" \
            -destination "platform=iOS Simulator,name=$DEVICE" \
            -skip-testing:FoodMapUITests \
            -enableCodeCoverage YES \
            -resultBundlePath build/FoodMap.xcresult \
            CODE_SIGNING_ALLOWED=NO

      - name: Generate Cobertura coverage report
        run: |
          brew install xcresultparser
          xcresultparser \
            --output-format cobertura \
            --project-root "$GITHUB_WORKSPACE" \
            build/FoodMap.xcresult > coverage.xml
          echo "Generated coverage.xml ($(wc -l < coverage.xml) lines)"

      - name: Upload coverage report
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/upload-code-coverage@v1
        with:
          file: coverage.xml
          language: Swift
          label: code-coverage/xctest
