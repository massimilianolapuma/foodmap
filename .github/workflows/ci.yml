name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Lint, Build & Test
    runs-on: macos-15
    env:
      SCHEME: FoodMap
      DESTINATION: "platform=iOS Simulator,name=iPhone 17"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.app || true

      - name: Install tooling
        run: brew install xcodegen swiftlint swiftformat

      - name: Generate Xcode project
        run: xcodegen generate

      - name: SwiftFormat (lint)
        run: swiftformat --lint .

      - name: SwiftLint (strict)
        run: swiftlint --strict

      - name: Build
        run: |
          xcodebuild build \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || xcodebuild build -scheme "$SCHEME" -destination "$DESTINATION" CODE_SIGNING_ALLOWED=NO

      - name: Test
        run: |
          xcodebuild test \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            CODE_SIGNING_ALLOWED=NO \
            -enableCodeCoverage YES \
            | xcpretty || xcodebuild test -scheme "$SCHEME" -destination "$DESTINATION" CODE_SIGNING_ALLOWED=NO
