name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "25 7 * * 1" # Monday 07:25 UTC

permissions:
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ matrix.language == 'swift' && 'macos-26' || 'ubuntu-latest' }}
    timeout-minutes: ${{ matrix.language == 'swift' && 60 || 15 }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: swift
            build-mode: manual
          - language: actions
            build-mode: none
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Select latest stable Xcode
        if: matrix.language == 'swift'
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: latest-stable

      # Install tooling and generate the project BEFORE CodeQL init so these
      # steps are not wrapped by the CodeQL build tracer, which forces a
      # Rosetta 2 environment and breaks `brew install` on Apple Silicon.
      - name: Generate Xcode project
        if: matrix.language == 'swift'
        run: |
          brew install xcodegen
          xcodegen generate

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Build Swift (manual)
        if: matrix.language == 'swift'
        run: |
          xcodebuild build \
            -scheme FoodMap \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          category: "/language:${{ matrix.language }}"
